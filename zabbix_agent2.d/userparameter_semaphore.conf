# Мониторинг Ansible Semaphore через Zabbix Agent 2.
# Разместить в /etc/zabbix/zabbix_agent2.d/userparameter_semaphore.conf
# (каталог должен подключаться директивой Include в zabbix_agent2.conf).
#
# Скрипт: /etc/zabbix/script/semaphore_monitor.py (chmod 755)
# Конфиг: /etc/zabbix/semaphore_monitor.conf      (chmod 600, владелец zabbix)
#
# Таймауты задаются на стороне сервера per-item (Zabbix 7.x), в шаблоне
# для semaphore.status и semaphore.discovery выставлено 30s.

UserParameter=semaphore.ping,/etc/zabbix/script/semaphore_monitor.py ping
UserParameter=semaphore.discovery,/etc/zabbix/script/semaphore_monitor.py discovery
UserParameter=semaphore.status,/etc/zabbix/script/semaphore_monitor.py status
